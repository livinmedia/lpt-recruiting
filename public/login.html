<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Login — LPT Recruiting</title>
<meta name="robots" content="noindex"/>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#04060A;--card:#0C1017;--border:#1A2233;--border-h:#2A3A52;
  --teal:#00E5A0;--teal-dim:#00E5A015;--teal-mid:#00E5A030;
  --text:#F0F4F8;--sub:#8899AA;--muted:#4A5568;--red:#F56565;
}
html,body{height:100%}
body{background:var(--bg);color:var(--text);font-family:'SF Pro Display',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;display:flex;flex-direction:column;min-height:100vh}
.page-bg{position:fixed;inset:0;pointer-events:none;background:radial-gradient(ellipse 70% 50% at 50% 0%,rgba(0,229,160,0.07) 0%,transparent 70%)}

/* NAV */
nav{padding:0 24px;border-bottom:1px solid var(--border);background:rgba(4,6,10,0.9);backdrop-filter:blur(16px)}
.nav-inner{max-width:1200px;margin:0 auto;height:60px;display:flex;align-items:center;justify-content:space-between}
.nav-logo{font-size:17px;font-weight:800;color:var(--text);text-decoration:none;display:flex;align-items:center;gap:8px}
.nav-logo span{display:inline-flex;width:30px;height:30px;border-radius:6px;background:linear-gradient(135deg,var(--teal),#3B82F6);align-items:center;justify-content:center;font-size:14px;font-weight:900;color:#000}
.nav-back{font-size:14px;color:var(--sub);text-decoration:none;transition:color 0.15s}
.nav-back:hover{color:var(--text)}

/* MAIN */
main{flex:1;display:flex;align-items:center;justify-content:center;padding:40px 20px}
.auth-card{width:100%;max-width:420px;background:var(--card);border:1px solid var(--border);border-radius:16px;padding:40px 36px}
.auth-icon{width:52px;height:52px;border-radius:12px;background:linear-gradient(135deg,var(--teal),#3B82F6);display:flex;align-items:center;justify-content:center;font-size:24px;margin-bottom:20px}
.auth-title{font-size:26px;font-weight:800;margin-bottom:6px}
.auth-sub{font-size:15px;color:var(--sub);margin-bottom:32px;line-height:1.5}

/* FORM */
.form-group{margin-bottom:18px}
label{display:block;font-size:12px;font-weight:700;letter-spacing:1.2px;color:var(--muted);text-transform:uppercase;margin-bottom:8px}
input[type="email"],input[type="password"]{width:100%;padding:14px 16px;background:var(--bg);border:1.5px solid var(--border);border-radius:10px;color:var(--text);font-size:15px;font-family:inherit;outline:none;transition:border-color 0.15s}
input[type="email"]:focus,input[type="password"]:focus{border-color:var(--teal)}
input::placeholder{color:var(--muted)}
.form-footer-row{display:flex;justify-content:flex-end;margin-bottom:24px}
.form-link{font-size:13px;color:var(--sub);text-decoration:none;transition:color 0.15s}
.form-link:hover{color:var(--teal)}
.btn-submit{width:100%;padding:15px;border-radius:10px;background:var(--teal);color:#000;font-size:16px;font-weight:700;border:none;cursor:pointer;transition:all 0.2s;font-family:inherit;display:flex;align-items:center;justify-content:center;gap:8px}
.btn-submit:hover{filter:brightness(1.1)}
.btn-submit:disabled{opacity:0.5;cursor:not-allowed}

/* ERROR / SUCCESS */
.msg-box{padding:12px 16px;border-radius:8px;font-size:14px;margin-bottom:18px;display:none}
.msg-box.error{background:#F5656510;border:1px solid #F5656530;color:var(--red)}
.msg-box.success{background:var(--teal-dim);border:1px solid var(--teal-mid);color:var(--teal)}
.msg-box.show{display:block}

.divider{display:flex;align-items:center;gap:12px;margin:24px 0;color:var(--muted);font-size:13px}
.divider::before,.divider::after{content:'';flex:1;height:1px;background:var(--border)}
.auth-switch{text-align:center;font-size:14px;color:var(--sub)}
.auth-switch a{color:var(--teal);text-decoration:none;font-weight:600}
.auth-switch a:hover{text-decoration:underline}
</style>
</head>
<body>
<div class="page-bg"></div>

<nav>
  <div class="nav-inner">
    <a href="/home" class="nav-logo"><span>L</span> LPT Recruiting</a>
    <a href="/home" class="nav-back">← Back to home</a>
  </div>
</nav>

<main>
  <div class="auth-card">
    <div class="auth-icon">🔐</div>
    <h1 class="auth-title">Welcome back</h1>
    <p class="auth-sub">Sign in to your LPT Recruiting account.</p>

    <div class="msg-box error" id="error-msg"></div>
    <div class="msg-box success" id="success-msg"></div>

    <form id="login-form" onsubmit="handleLogin(event)">
      <div class="form-group">
        <label for="email">Email</label>
        <input type="email" id="email" placeholder="you@email.com" required autocomplete="email"/>
      </div>
      <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" placeholder="••••••••" required autocomplete="current-password"/>
      </div>
      <div class="form-footer-row">
        <a href="#" class="form-link">Forgot password?</a>
      </div>
      <button type="submit" class="btn-submit" id="submit-btn">Sign In</button>
    </form>

    <div class="divider">or</div>
    <div class="auth-switch">Don't have an account? <a href="/signup">Sign up free</a></div>
  </div>
</main>

<script>
const SUPABASE_URL = 'https://usknntguurefeyzusbdh.supabase.co';
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InVza25udGd1dXJlZmV5enVzYmRoIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI0MTcwODAsImV4cCI6MjA4Nzk5MzA4MH0.pxexo90zyugIA4pPzLonGo3E1frr8bSZvz-XT7BmuqQ';
const { createClient } = supabase;
const client = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

function showError(msg) {
  const el = document.getElementById('error-msg');
  el.textContent = msg;
  el.classList.add('show');
  document.getElementById('success-msg').classList.remove('show');
}
function showSuccess(msg) {
  const el = document.getElementById('success-msg');
  el.textContent = msg;
  el.classList.add('show');
  document.getElementById('error-msg').classList.remove('show');
}

async function handleLogin(e) {
  e.preventDefault();
  const btn = document.getElementById('submit-btn');
  const email = document.getElementById('email').value.trim();
  const password = document.getElementById('password').value;

  btn.disabled = true;
  btn.textContent = 'Signing in...';

  const { data, error } = await client.auth.signInWithPassword({ email, password });
  if (error) {
    showError(error.message);
    btn.disabled = false;
    btn.textContent = 'Sign In';
  } else {
    showSuccess('✓ Signed in! Redirecting...');
    setTimeout(() => { window.location.href = '/'; }, 800);
  }
}
</script>
</body>
</html>
