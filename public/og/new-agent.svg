<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#04060A"/>
      <stop offset="100%" stop-color="#0B0F17"/>
    </linearGradient>
    <linearGradient id="tealgrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#00E5A0"/>
      <stop offset="100%" stop-color="#3B82F6"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Glow -->
  <ellipse cx="600" cy="0" rx="500" ry="300" fill="#00E5A0" fill-opacity="0.04"/>

  <!-- Accent bar -->
  <rect x="0" y="0" width="6" height="630" fill="url(#tealgrad)"/>

  <!-- Top gradient bar -->
  <rect x="0" y="0" width="1200" height="4" fill="url(#tealgrad)"/>

  <!-- Grid lines -->
  <line x1="0" y1="210" x2="1200" y2="210" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
  <line x1="0" y1="420" x2="1200" y2="420" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>

  <!-- Brand -->
  <rect x="60" y="54" width="160" height="36" rx="8" fill="#00E5A0" fill-opacity="0.14"/>
  <text x="76" y="78" font-family="system-ui, -apple-system, sans-serif" font-size="16" font-weight="700" fill="#00E5A0" letter-spacing="2">RKRT.IN</text>

  <!-- NEW badge -->
  <rect x="240" y="54" width="80" height="36" rx="8" fill="#3B82F6" fill-opacity="0.2"/>
  <text x="256" y="78" font-family="system-ui, -apple-system, sans-serif" font-size="16" font-weight="700" fill="#3B82F6" letter-spacing="1">NEW</text>

  <!-- Headline -->
  <text x="60" y="190" font-family="system-ui, -apple-system, sans-serif" font-size="74" font-weight="800" fill="#E4E8F1">New Agent</text>
  <text x="60" y="274" font-family="system-ui, -apple-system, sans-serif" font-size="74" font-weight="800" fill="url(#tealgrad)">Launch Program</text>

  <!-- Underline -->
  <rect x="60" y="288" width="500" height="5" rx="2" fill="url(#tealgrad)"/>

  <!-- Subtitle -->
  <text x="60" y="348" font-family="system-ui, -apple-system, sans-serif" font-size="32" font-weight="500" fill="#7B8BA3">Start Your Career Right</text>

  <!-- Feature pills -->
  <rect x="60" y="390" width="180" height="44" rx="22" fill="#00E5A0" fill-opacity="0.12" stroke="#00E5A0" stroke-opacity="0.3" stroke-width="1"/>
  <text x="150" y="418" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="15" font-weight="600" fill="#00E5A0">Mentorship</text>

  <rect x="256" y="390" width="180" height="44" rx="22" fill="#3B82F6" fill-opacity="0.12" stroke="#3B82F6" stroke-opacity="0.3" stroke-width="1"/>
  <text x="346" y="418" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="15" font-weight="600" fill="#3B82F6">AI Tools</text>

  <rect x="452" y="390" width="180" height="44" rx="22" fill="#8B5CF6" fill-opacity="0.12" stroke="#8B5CF6" stroke-opacity="0.3" stroke-width="1"/>
  <text x="542" y="418" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="15" font-weight="600" fill="#8B5CF6">Training</text>

  <rect x="648" y="390" width="180" height="44" rx="22" fill="#F59E0B" fill-opacity="0.12" stroke="#F59E0B" stroke-opacity="0.3" stroke-width="1"/>
  <text x="738" y="418" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="15" font-weight="600" fill="#F59E0B">Top Splits</text>

  <!-- Right visual: rocket/launch icon -->
  <circle cx="1060" cy="300" r="180" fill="#00E5A0" fill-opacity="0.04" stroke="#00E5A0" stroke-opacity="0.1" stroke-width="1"/>
  <text x="1060" y="340" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="120" fill="#00E5A0" fill-opacity="0.8">🚀</text>

  <!-- Footer -->
  <text x="60" y="590" font-family="system-ui, -apple-system, sans-serif" font-size="16" fill="#2A3345">rkrt.in/new-agent</text>
</svg>
