<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Team Blog — RKRT</title>
<meta name="description" content="Recruiting intelligence for your team.">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#0B1120;--bg2:#0F1629;--bg3:#141C32;--card:#111827;--tc:#10B981;--tc-dim:rgba(16,185,129,0.08);--t:#E8ECF4;--s:#8B9AB8;--m:#4B5975;--b:rgba(255,255,255,0.06)}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:var(--bg);color:var(--t);line-height:1.6;overflow-x:hidden}
a{color:inherit;text-decoration:none}
.wrap{max-width:1100px;margin:0 auto;padding:0 24px}

nav{position:sticky;top:0;z-index:100;background:rgba(11,17,32,0.92);backdrop-filter:blur(16px);border-bottom:1px solid var(--b)}
.nav-inner{max-width:1100px;margin:0 auto;padding:0 24px;height:56px;display:flex;align-items:center;gap:16px}
.nav-brand{display:flex;align-items:center;gap:10px;flex-shrink:0}
.nav-logo-circle{width:32px;height:32px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:800;color:#000;flex-shrink:0}
.nav-logo-circle img{width:100%;height:100%;object-fit:cover;border-radius:8px}
.nav-team-name{font-size:16px;font-weight:700}
.nav-links{display:flex;gap:18px;flex:1;margin-left:16px}
.nav-links a{font-size:13px;color:var(--s);font-weight:500;transition:color 0.15s;white-space:nowrap}
.nav-links a:hover{color:var(--t)}
.nav-cta{margin-left:auto;padding:8px 18px;border-radius:7px;font-weight:700;font-size:13px;color:#000;white-space:nowrap;flex-shrink:0;transition:filter 0.15s}
.nav-cta:hover{filter:brightness(1.1)}

.hero{padding:48px 0 36px;display:grid;grid-template-columns:1fr 0.6fr;gap:32px;align-items:center;cursor:pointer}
.hero-badge{display:inline-block;font-size:11px;font-weight:700;letter-spacing:1.5px;padding:4px 12px;border-radius:20px;margin-bottom:14px}
.hero h1{font-size:clamp(24px,3.5vw,36px);font-weight:800;line-height:1.15;margin-bottom:12px}
.hero-sub{font-size:15px;color:var(--s);line-height:1.7;margin-bottom:16px;max-width:480px}
.hero-meta{font-size:12px;color:var(--m);display:flex;gap:14px;flex-wrap:wrap}
.hero-visual{border-radius:14px;aspect-ratio:4/3;display:flex;align-items:center;justify-content:center;overflow:hidden;background:var(--card);border:1px solid var(--b)}
.hero-visual img{width:100%;height:100%;object-fit:cover}
.hero-welcome{padding:48px 0 36px;text-align:center}
.hero-welcome h1{font-size:clamp(24px,3.5vw,36px);font-weight:800;margin-bottom:10px}
.hero-welcome p{font-size:15px;color:var(--s);max-width:480px;margin:0 auto}

.about-card{background:var(--card);border:1px solid var(--b);border-radius:12px;padding:20px 24px;margin-bottom:32px;display:flex;align-items:center;gap:16px;flex-wrap:wrap}
.about-card .about-text{flex:1;min-width:200px}
.about-card h3{font-size:15px;font-weight:700;margin-bottom:4px}
.about-card p{font-size:13px;color:var(--s)}
.about-badge{padding:6px 14px;border-radius:20px;font-size:11px;font-weight:700;flex-shrink:0}
.powered-tag{font-size:11px;color:var(--m);flex-shrink:0}

.section-label{font-size:11px;font-weight:700;letter-spacing:2px;text-transform:uppercase;margin-bottom:16px}

.article-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:20px;margin-bottom:40px}
.article-card{background:var(--card);border:1px solid var(--b);border-radius:12px;overflow:hidden;cursor:pointer;transition:border-color 0.2s,transform 0.2s;display:flex;flex-direction:column}
.article-card:hover{border-color:rgba(255,255,255,0.12);transform:translateY(-2px)}
.article-card-img{height:150px;background:var(--bg3);display:flex;align-items:center;justify-content:center;overflow:hidden}
.article-card-img img{width:100%;height:100%;object-fit:cover}
.article-card-body{padding:16px;flex:1;display:flex;flex-direction:column}
.article-badge{display:inline-block;font-size:10px;font-weight:700;letter-spacing:1px;padding:3px 10px;border-radius:20px;margin-bottom:8px;width:fit-content}
.article-card h3{font-size:15px;font-weight:700;line-height:1.35;margin-bottom:6px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.article-card p{font-size:12px;color:var(--s);line-height:1.5;flex:1;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;margin-bottom:10px}
.article-card-meta{font-size:11px;color:var(--m);display:flex;gap:10px;margin-top:auto}

.badge-brokerage_intel{background:rgba(249,115,22,0.12);color:#F97316}
.badge-playbook{background:rgba(139,92,246,0.12);color:#8B5CF6}
.badge-commission{background:rgba(245,158,11,0.12);color:#F59E0B}
.badge-market_data{background:rgba(16,185,129,0.12);color:#10B981}
.badge-industry_news{background:rgba(59,130,246,0.12);color:#3B82F6}
.badge-spotlight{background:rgba(236,72,153,0.12);color:#EC4899}

.email-capture{background:var(--card);border:1px solid var(--b);border-radius:14px;padding:28px;text-align:center;margin:32px 0}
.email-capture h3{font-size:18px;font-weight:800;margin-bottom:6px}
.email-capture p{font-size:14px;color:var(--s);margin-bottom:16px}
.email-form{display:flex;gap:10px;max-width:400px;margin:0 auto}
.email-form input{flex:1;padding:10px 14px;border-radius:8px;background:var(--bg);border:1px solid var(--b);color:var(--t);font-size:14px;outline:none;font-family:inherit;min-width:0}
.email-form input:focus{border-color:var(--tc)}
.email-form button{padding:10px 20px;border-radius:8px;color:#000;font-weight:700;font-size:14px;border:none;cursor:pointer;white-space:nowrap;font-family:inherit}

.recruit-cta{border-radius:14px;padding:32px;text-align:center;margin:32px 0}
.recruit-cta h3{font-size:20px;font-weight:800;margin-bottom:8px}
.recruit-cta p{font-size:14px;color:rgba(255,255,255,0.8);margin-bottom:18px;max-width:480px;margin-left:auto;margin-right:auto}
.recruit-cta a{display:inline-block;padding:12px 28px;border-radius:9px;background:#fff;color:#000;font-weight:700;font-size:15px}

.cross-promo{margin:40px 0}
.cross-promo h3{font-size:16px;font-weight:700;margin-bottom:14px;text-align:center;color:var(--s)}

footer{padding:28px 0;border-top:1px solid var(--b);background:var(--bg2);margin-top:40px}
.footer-inner{max-width:1100px;margin:0 auto;padding:0 24px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px;font-size:12px;color:var(--m)}

.loading{text-align:center;padding:80px 0;color:var(--m)}

@media(max-width:768px){
  .nav-links{display:none}
  .hero{grid-template-columns:1fr;padding:32px 0 24px}
  .hero-visual{aspect-ratio:16/9;max-height:180px}
  .article-grid{grid-template-columns:1fr}
  .email-form{flex-direction:column}
  .about-card{flex-direction:column;text-align:center}
  .footer-inner{flex-direction:column;text-align:center}
}
@media(min-width:769px) and (max-width:1024px){.article-grid{grid-template-columns:1fr 1fr}}
</style>
</head>
<body>
<nav><div class="nav-inner">
  <a href="#" class="nav-brand" id="nav-brand"><div class="nav-logo-circle" id="nav-logo">T</div><span class="nav-team-name" id="nav-name">Loading...</span></a>
  <div class="nav-links"><a href="#articles">Articles</a><a href="#about">About</a><a href="https://rkrt.in">RKRT Intel →</a></div>
  <a href="https://join.rkrt.in" class="nav-cta" id="nav-cta">Join Our Team →</a>
</div></nav>

<div class="wrap">
  <div id="hero-area" class="loading">Loading...</div>
  <div id="about-area"></div>
  <div id="articles-label" class="section-label" style="display:none">ARTICLES</div>
  <div class="article-grid" id="article-grid"></div>
  <div class="email-capture" id="email-section"><h3 id="email-title">Get updates</h3><p id="email-sub">Recruiting intel delivered to your inbox.</p>
    <form class="email-form" onsubmit="return handleSub(event)"><input type="email" id="sub-email" placeholder="you@email.com" required><button type="submit" id="sub-btn" style="background:var(--tc)">Subscribe</button></form>
    <div id="sub-msg" style="font-size:12px;margin-top:8px;display:none"></div>
  </div>
  <div id="recruit-cta-area"></div>
  <div class="cross-promo" id="cross-promo"><h3>More from RKRT Intel</h3><div class="article-grid" id="intel-grid"></div></div>
</div>

<footer><div class="footer-inner"><span id="footer-name">Powered by RKRT.in</span><span>© 2026 · LIVIN Media</span></div></footer>

<script>
const SB='https://usknntguurefeyzusbdh.supabase.co';
const SK='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InVza25udGd1dXJlZmV5enVzYmRoIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI0MTcwODAsImV4cCI6MjA4Nzk5MzA4MH0.pxexo90zyugIA4pPzLonGo3E1frr8bSZvz-XT7BmuqQ';
const HH={apikey:SK,Authorization:'Bearer '+SK};
const CAT_LABELS={brokerage_intel:'Brokerage Intel',playbook:'Playbook',commission:'Commission',market_data:'Market Data',industry_news:'Industry News',spotlight:'Spotlight'};

const parts=window.location.pathname.split('/').filter(Boolean);
const teamSlug=parts[1]||'';
const basePath='/team/'+teamSlug;

function fmtDate(d){return new Date(d).toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'});}
function initials(name){return(name||'T').split(' ').map(w=>w[0]).join('').substring(0,2).toUpperCase();}

function renderCard(a,linkBase){
  const img=a.cover_image_url?`<img src="${a.cover_image_url}" alt="" loading="lazy">`:`<div style="font-size:28px;opacity:0.2">📄</div>`;
  const cat=(CAT_LABELS[a.category]||a.category||'').toUpperCase();
  return `<a href="${linkBase}/${a.slug}" class="article-card"><div class="article-card-img">${img}</div><div class="article-card-body"><span class="article-badge badge-${a.category}">${cat}</span><h3>${a.title}</h3><p>${a.subtitle||''}</p><div class="article-card-meta"><span>${a.read_time_min||'5'} min read</span><span>${a.published_at?fmtDate(a.published_at):''}</span></div></div></a>`;
}

async function load(){
  if(!teamSlug){document.getElementById('hero-area').innerHTML='<div class="loading">No team specified. <a href="https://rkrt.in" style="color:var(--tc)">Back to RKRT Intel →</a></div>';return;}

  // Fetch team
  const tr=await fetch(SB+'/rest/v1/team_blogs?slug=eq.'+teamSlug+'&active=eq.true&select=*',{headers:HH});
  const teams=await tr.json();
  if(!teams||!teams[0]){document.getElementById('hero-area').innerHTML='<div class="loading">Team not found. <a href="https://rkrt.in" style="color:var(--tc)">Back to RKRT Intel →</a></div>';return;}
  const team=teams[0];

  // Apply theme color
  const tc=team.theme_color||'#10B981';
  document.documentElement.style.setProperty('--tc',tc);
  document.documentElement.style.setProperty('--tc-dim',tc+'12');

  // Update page
  document.title=team.name+' — RKRT';
  document.querySelector('meta[name="description"]').content=team.tagline||'Recruiting intelligence from '+team.name;
  document.getElementById('nav-name').textContent=team.name;
  document.getElementById('nav-logo').style.background=tc;
  document.getElementById('nav-logo').textContent=initials(team.name);
  if(team.logo_url)document.getElementById('nav-logo').innerHTML=`<img src="${team.logo_url}" alt="">`;
  document.getElementById('nav-cta').style.background=tc;
  document.getElementById('footer-name').textContent=team.name+' · Powered by RKRT.in';

  // Email section
  document.getElementById('email-title').textContent='Get updates from '+team.name;
  document.getElementById('email-sub').textContent='Recruiting intel tailored to '+(team.market||'your market')+'.';
  document.getElementById('sub-btn').style.background=tc;

  // Fetch articles
  const ar=await fetch(SB+'/rest/v1/team_articles?blog_id=eq.'+team.id+'&published=eq.true&order=published_at.desc&limit=12',{headers:HH});
  const articles=await ar.json()||[];

  // Hero
  if(articles.length>0){
    const a=articles[0];
    const img=a.cover_image_url?`<img src="${a.cover_image_url}" alt="">`:`<div style="font-size:48px;opacity:0.2">📊</div>`;
    document.getElementById('hero-area').innerHTML=`<a href="${basePath}/${a.slug}" class="hero"><div><div class="hero-badge badge-${a.category}">${(CAT_LABELS[a.category]||'').toUpperCase()}</div><h1>${a.title}</h1><div class="hero-sub">${a.subtitle||''}</div><div class="hero-meta"><span>${a.read_time_min||'5'} min read</span><span>${a.published_at?fmtDate(a.published_at):''}</span></div></div><div class="hero-visual">${img}</div></a>`;
  }else{
    document.getElementById('hero-area').innerHTML=`<div class="hero-welcome"><h1>${team.name}</h1><p>${team.tagline||'Recruiting intelligence for '+(team.market||'your market')}</p></div>`;
  }

  // About
  document.getElementById('about-area').innerHTML=`<div class="about-card" id="about"><div class="about-text"><h3>${team.name}</h3><p>${team.tagline||''}</p></div>${team.market?`<span class="about-badge" style="background:${tc}12;color:${tc};border:1px solid ${tc}30">${team.market}</span>`:''}<span class="powered-tag">Powered by RKRT.in</span></div>`;

  // Articles grid
  if(articles.length>0){
    document.getElementById('articles-label').style.display='block';
    document.getElementById('article-grid').innerHTML=articles.map(a=>renderCard(a,basePath)).join('');
  }

  // Recruit CTA
  document.getElementById('recruit-cta-area').innerHTML=`<div class="recruit-cta" style="background:linear-gradient(135deg,${tc}40,${tc})"><h3>Interested in joining ${team.name}?</h3><p>We're looking for ambitious agents in ${team.market||'our market'}. Learn about our culture, splits, and technology.</p><a href="https://join.rkrt.in?tab=agent">Learn More →</a></div>`;

  // RKRT Intel cross-promo
  try{
    const ir=await fetch(SB+'/rest/v1/intel_articles?published=eq.true&order=published_at.desc&limit=3&select=slug,title,subtitle,category,cover_image_url,read_time_min,published_at',{headers:HH});
    const intel=await ir.json()||[];
    if(intel.length>0)document.getElementById('intel-grid').innerHTML=intel.map(a=>renderCard(a,'https://rkrt.in')).join('');
    else document.getElementById('cross-promo').style.display='none';
  }catch(e){document.getElementById('cross-promo').style.display='none';}

  // Store teamSlug for subscribe
  window._teamSlug=teamSlug;
}

async function handleSub(e){
  e.preventDefault();
  const email=document.getElementById('sub-email').value.trim();if(!email)return false;
  const btn=document.getElementById('sub-btn'),msg=document.getElementById('sub-msg');
  btn.textContent='...';btn.disabled=true;
  try{await fetch(SB+'/rest/v1/intel_subscribers',{method:'POST',headers:{...HH,'Content-Type':'application/json','Prefer':'return=minimal'},body:JSON.stringify({email,source:'team_'+(window._teamSlug||'unknown')})});}catch(e){}
  msg.style.display='block';msg.style.color='var(--tc)';msg.textContent='✓ Subscribed!';
  document.getElementById('sub-email').value='';
  btn.textContent='Subscribe';btn.disabled=false;
  return false;
}

load();
</script>
<script src="/empire-track.js" data-spoke="rkrt-team" defer></script>
</body>
</html>
