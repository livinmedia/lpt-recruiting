<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RKRT</title>
<meta name="description" content="">
<meta property="og:title" content="RKRT"><meta property="og:site_name" content="RKRT">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#0B1120;--bg2:#0F1629;--bg3:#141C32;--card:#111827;--tc:#10B981;--tc-dim:rgba(16,185,129,0.08);--t:#E8ECF4;--s:#8B9AB8;--m:#4B5975;--b:rgba(255,255,255,0.06)}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:var(--bg);color:var(--t);line-height:1.6;overflow-x:hidden}
a{color:inherit;text-decoration:none}

nav{position:sticky;top:0;z-index:100;background:rgba(11,17,32,0.92);backdrop-filter:blur(16px);border-bottom:1px solid var(--b)}
.nav-inner{max-width:1100px;margin:0 auto;padding:0 24px;height:52px;display:flex;align-items:center;justify-content:space-between}
.nav-brand{display:flex;align-items:center;gap:10px}
.nav-logo-circle{width:28px;height:28px;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:800;color:#000;flex-shrink:0}
.nav-logo-circle img{width:100%;height:100%;object-fit:cover;border-radius:6px}
.nav-team-name{font-size:15px;font-weight:700}
.nav-back{font-size:13px;color:var(--s)}.nav-back:hover{color:var(--t)}

.page-wrap{max-width:1100px;margin:0 auto;padding:0 24px}
.two-col{display:grid;grid-template-columns:1fr 320px;gap:36px;align-items:start}
.main-col{min-width:0}
.sidebar{position:sticky;top:68px;display:flex;flex-direction:column;gap:18px;padding-top:40px}

.sb-card{background:var(--card);border:1px solid var(--b);border-radius:12px;padding:18px;overflow:hidden}
.sb-card h4{font-size:13px;font-weight:700;margin-bottom:10px}
.sb-cta-card{text-align:center;border:none}
.sb-cta-card h4{font-size:15px;margin-bottom:4px}
.sb-cta-card p{font-size:12px;color:rgba(255,255,255,0.75);margin-bottom:12px}
.sb-cta-btn{display:block;padding:9px;border-radius:7px;color:#000;font-weight:700;font-size:13px;text-align:center}
.sb-article-item{display:block;padding:8px 0;border-bottom:1px solid var(--b)}
.sb-article-item:last-child{border-bottom:none}
.sb-article-item h5{font-size:12px;font-weight:600;line-height:1.4;margin-bottom:2px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.sb-article-item span{font-size:10px;color:var(--m)}
.sb-email-input{width:100%;padding:8px 12px;border-radius:7px;background:var(--bg);border:1px solid var(--b);color:var(--t);font-size:13px;outline:none;font-family:inherit;margin-bottom:6px}
.sb-email-input:focus{border-color:var(--tc)}
.sb-email-btn{width:100%;padding:8px;border-radius:7px;color:#000;font-weight:700;font-size:12px;border:none;cursor:pointer;font-family:inherit}

.article-header{padding:40px 0 28px}
.article-meta{display:flex;gap:12px;align-items:center;flex-wrap:wrap;margin-bottom:14px}
.badge{display:inline-block;font-size:10px;font-weight:700;letter-spacing:1px;padding:3px 10px;border-radius:20px}
.badge-brokerage_intel{background:rgba(249,115,22,0.12);color:#F97316}
.badge-playbook{background:rgba(139,92,246,0.12);color:#8B5CF6}
.badge-commission{background:rgba(245,158,11,0.12);color:#F59E0B}
.badge-market_data{background:rgba(16,185,129,0.12);color:#10B981}
.badge-industry_news{background:rgba(59,130,246,0.12);color:#3B82F6}
.badge-spotlight{background:rgba(236,72,153,0.12);color:#EC4899}
.meta-text{font-size:12px;color:var(--m)}
.article-title{font-size:clamp(24px,3.5vw,34px);font-weight:800;line-height:1.15;margin-bottom:10px}
.article-subtitle{font-size:15px;color:var(--s);line-height:1.7;margin-bottom:20px}
.author-bar{display:flex;align-items:center;gap:12px;padding:14px 0;border-top:1px solid var(--b);border-bottom:1px solid var(--b);margin-bottom:28px}
.author-avatar{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:800;color:#000;flex-shrink:0}
.author-info{flex:1}.author-name{font-size:13px;font-weight:700}.author-sub{font-size:10px;color:var(--m)}
.share-btns{display:flex;gap:5px}
.share-btn{width:30px;height:30px;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:13px;background:var(--card);border:1px solid var(--b);cursor:pointer;color:var(--s);transition:all 0.15s}
.share-btn:hover{color:var(--t);border-color:rgba(255,255,255,0.12)}

.article-hero{width:100%;border-radius:12px;margin-bottom:28px;overflow:hidden;max-height:380px;background:var(--card);display:flex;align-items:center;justify-content:center}
.article-hero img{width:100%;height:100%;object-fit:cover}

.article-body{font-size:16px;line-height:1.85}
.article-body h2{font-size:20px;font-weight:700;margin:28px 0 10px}
.article-body h3{font-size:17px;font-weight:700;margin:22px 0 8px}
.article-body p{margin-bottom:16px}
.article-body ul,.article-body ol{margin:0 0 16px 24px}
.article-body li{margin-bottom:6px}
.article-body strong{color:var(--t)}
.article-body a{color:var(--tc);text-decoration:underline}
.article-body blockquote{border-left:3px solid var(--tc);padding:12px 18px;margin:16px 0;background:var(--tc-dim);border-radius:0 8px 8px 0;font-style:italic;color:var(--s)}
.article-body img{max-width:100%;border-radius:10px;margin:16px 0}
.article-body table{width:100%;border-collapse:collapse;margin:16px 0;font-size:14px}
.article-body th,.article-body td{padding:8px 12px;border:1px solid var(--b);text-align:left}
.article-body th{background:var(--card);font-weight:700;font-size:12px;color:var(--s)}
.data-highlight{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;margin:24px 0}
.dh-item{background:var(--card);border:1px solid var(--b);border-radius:10px;padding:18px 14px;text-align:center}
.dh-num{font-size:28px;font-weight:800;color:var(--tc);line-height:1.1;margin-bottom:6px}
.dh-label{font-size:12px;color:var(--s);line-height:1.4;border-top:1px solid var(--b);padding-top:6px}

.inline-cta{border-radius:12px;padding:24px;margin:24px 0;text-align:center}
.inline-cta h3{font-size:17px;font-weight:700;margin-bottom:6px}
.inline-cta p{font-size:13px;color:rgba(255,255,255,0.8);margin-bottom:12px}
.inline-cta a{display:inline-block;padding:10px 22px;border-radius:8px;font-weight:700;font-size:14px;background:#fff;color:#000}

.article-tags{display:flex;gap:6px;flex-wrap:wrap;margin:28px 0;padding-top:20px;border-top:1px solid var(--b)}
.tag{padding:4px 12px;border-radius:20px;font-size:11px;font-weight:600;background:var(--card);border:1px solid var(--b);color:var(--s)}

.related{margin:36px 0}
.related h3{font-size:16px;font-weight:700;margin-bottom:14px}
.related-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:14px}
.related-card{background:var(--card);border:1px solid var(--b);border-radius:10px;overflow:hidden;transition:border-color 0.2s}
.related-card:hover{border-color:rgba(255,255,255,0.12)}
.related-card-img{height:100px;background:var(--bg3);display:flex;align-items:center;justify-content:center;overflow:hidden}
.related-card-img img{width:100%;height:100%;object-fit:cover}
.related-card-body{padding:12px}
.related-card h4{font-size:13px;font-weight:700;line-height:1.3;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.related-card span{font-size:10px;color:var(--m);margin-top:3px;display:block}

footer{padding:24px 0;border-top:1px solid var(--b);background:var(--bg2);margin-top:36px}
.footer-inner{max-width:1100px;margin:0 auto;padding:0 24px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px;font-size:12px;color:var(--m)}

.loading{text-align:center;padding:80px 0;color:var(--m)}

@media(max-width:900px){.two-col{grid-template-columns:1fr;gap:0}.sidebar{position:static;padding-top:16px}}
@media(max-width:768px){
  .page-wrap{padding:0 16px}.article-title{font-size:22px}
  .related-grid{grid-template-columns:1fr}
  .data-highlight{grid-template-columns:1fr 1fr}
  .author-bar{flex-wrap:wrap}.footer-inner{flex-direction:column;text-align:center}
}
</style>
</head>
<body>
<nav><div class="nav-inner">
  <a href="#" class="nav-brand" id="nav-brand"><div class="nav-logo-circle" id="nav-logo" style="background:var(--tc)">T</div><span class="nav-team-name" id="nav-name">Loading</span></a>
  <a href="#" class="nav-back" id="nav-back">&larr; All Articles</a>
</div></nav>

<div class="page-wrap"><div class="two-col">
  <div class="main-col" id="article-content"><div class="loading">Loading article...</div></div>
  <div class="sidebar" id="sidebar"></div>
</div></div>

<footer><div class="footer-inner"><span id="footer-name">Powered by RKRT.in</span><span>© 2026 · LIVIN Media</span></div></footer>

<script>
const SB='https://usknntguurefeyzusbdh.supabase.co';
const SK='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InVza25udGd1dXJlZmV5enVzYmRoIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI0MTcwODAsImV4cCI6MjA4Nzk5MzA4MH0.pxexo90zyugIA4pPzLonGo3E1frr8bSZvz-XT7BmuqQ';
const HH={apikey:SK,Authorization:'Bearer '+SK};
const CAT_LABELS={brokerage_intel:'Brokerage Intel',playbook:'Playbook',commission:'Commission',market_data:'Market Data',industry_news:'Industry News',spotlight:'Spotlight'};

const parts=window.location.pathname.split('/').filter(Boolean);
const teamSlug=parts[1]||'';
const articleSlug=parts[2]||'';
const basePath='/team/'+teamSlug;

function fmtDate(d){return new Date(d).toLocaleDateString('en-US',{month:'long',day:'numeric',year:'numeric'});}
function initials(n){return(n||'T').split(' ').map(w=>w[0]).join('').substring(0,2).toUpperCase();}
function shareX(t,u){window.open('https://x.com/intent/tweet?text='+encodeURIComponent(t)+'&url='+encodeURIComponent(u),'_blank');}
function shareLI(u){window.open('https://www.linkedin.com/sharing/share-offsite/?url='+encodeURIComponent(u),'_blank');}
function copyLink(u){navigator.clipboard.writeText(u);const b=document.getElementById('copy-btn');if(b){b.textContent='✓';setTimeout(()=>b.textContent='🔗',1500);}}

async function load(){
  if(!teamSlug||!articleSlug){document.getElementById('article-content').innerHTML='<div class="loading">Not found. <a href="https://rkrt.in" style="color:var(--tc)">Back →</a></div>';return;}

  // Fetch team
  const tr=await fetch(SB+'/rest/v1/team_blogs?slug=eq.'+teamSlug+'&active=eq.true&select=*',{headers:HH});
  const teams=await tr.json();
  if(!teams||!teams[0]){document.getElementById('article-content').innerHTML='<div class="loading">Team not found.</div>';return;}
  const team=teams[0];
  const tc=team.theme_color||'#10B981';
  document.documentElement.style.setProperty('--tc',tc);
  document.documentElement.style.setProperty('--tc-dim',tc+'12');
  document.getElementById('nav-name').textContent=team.name;
  document.getElementById('nav-logo').style.background=tc;
  document.getElementById('nav-logo').textContent=initials(team.name);
  if(team.logo_url)document.getElementById('nav-logo').innerHTML=`<img src="${team.logo_url}" alt="">`;
  document.getElementById('nav-brand').href=basePath;
  document.getElementById('nav-back').href=basePath;
  document.getElementById('footer-name').textContent=team.name+' · Powered by RKRT.in';

  // Fetch article
  const ar=await fetch(SB+'/rest/v1/team_articles?blog_id=eq.'+team.id+'&slug=eq.'+articleSlug+'&published=eq.true&select=*',{headers:HH});
  const articles=await ar.json();
  if(!articles||!articles[0]){document.getElementById('article-content').innerHTML='<div class="loading">Article not found. <a href="'+basePath+'" style="color:var(--tc)">Back to '+team.name+' →</a></div>';return;}
  const a=articles[0];

  document.title=a.title+' — '+team.name;
  const desc=document.querySelector('meta[name="description"]');if(desc)desc.content=a.subtitle||'';
  const ogT=document.querySelector('meta[property="og:title"]');if(ogT)ogT.content=a.title;

  const pageUrl=window.location.href;
  const catLabel=(CAT_LABELS[a.category]||'').toUpperCase();
  const safeTitle=(a.title||'').replace(/'/g,"\\'").replace(/"/g,'&quot;');
  const coverImg=a.cover_image_url||null;

  document.getElementById('article-content').innerHTML=`
    <div class="article-header">
      <div class="article-meta"><span class="badge badge-${a.category}">${catLabel}</span><span class="meta-text">${a.published_at?fmtDate(a.published_at):''}</span><span class="meta-text">${a.read_time_min||'5'} min read</span><span class="meta-text">${a.views||0} views</span></div>
      <h1 class="article-title">${a.title}</h1>
      ${a.subtitle?'<div class="article-subtitle">'+a.subtitle+'</div>':''}
      <div class="author-bar"><div class="author-avatar" style="background:linear-gradient(135deg,${tc},#3B82F6)">${initials(a.author||team.name)}</div><div class="author-info"><div class="author-name">${a.author||team.name}</div><div class="author-sub">${team.name}</div></div>
        <div class="share-btns"><div class="share-btn" onclick="shareX('${safeTitle}','${pageUrl}')">𝕏</div><div class="share-btn" onclick="shareLI('${pageUrl}')">in</div><div class="share-btn" id="copy-btn" onclick="copyLink('${pageUrl}')">🔗</div></div>
      </div>
    </div>
    ${coverImg?'<div class="article-hero"><img src="'+coverImg+'" alt=""></div>':''}
    <div class="article-body">${a.body||'<p>No content.</p>'}</div>
    <div class="inline-cta" style="background:linear-gradient(135deg,${tc}60,${tc})"><h3>Interested in joining ${team.name}?</h3><p>Learn about our culture, technology, and what makes us different.</p><a href="https://join.rkrt.in?tab=agent">Learn More →</a></div>
    ${a.tags&&a.tags.length?'<div class="article-tags">'+a.tags.map(t=>'<span class="tag">'+t+'</span>').join('')+'</div>':''}
    <div class="related" id="related-section"></div>
  `;

  // Increment views
  try{await fetch(SB+'/rest/v1/team_articles?id=eq.'+a.id,{method:'PATCH',headers:{...HH,'Content-Type':'application/json','Prefer':'return=minimal'},body:JSON.stringify({views:(a.views||0)+1})});}catch(e){}

  // Sidebar
  const otherRes=await fetch(SB+'/rest/v1/team_articles?blog_id=eq.'+team.id+'&slug=neq.'+articleSlug+'&published=eq.true&order=published_at.desc&limit=5&select=slug,title,read_time_min',{headers:HH});
  const others=await otherRes.json()||[];

  document.getElementById('sidebar').innerHTML=`
    <div class="sb-card sb-cta-card" style="background:linear-gradient(135deg,${tc}60,${tc})"><h4>Join ${team.name}</h4><p>Explore what makes our team different.</p><a href="https://join.rkrt.in?tab=agent" class="sb-cta-btn">Learn More →</a></div>
    ${others.length?'<div class="sb-card"><h4>More from '+team.name+'</h4>'+others.map(o=>'<a href="'+basePath+'/'+o.slug+'" class="sb-article-item"><h5>'+o.title+'</h5><span>'+(o.read_time_min||'5')+' min read</span></a>').join('')+'</div>':''}
    <div class="sb-card"><h4>Get Updates</h4><form onsubmit="return handleSub(event)"><input type="email" id="sb-email" class="sb-email-input" placeholder="you@email.com" required><button type="submit" id="sb-btn" class="sb-email-btn" style="background:${tc}">Subscribe</button></form><div id="sb-msg" style="font-size:11px;margin-top:4px;display:none"></div></div>
  `;

  // Related (same team)
  const relRes=await fetch(SB+'/rest/v1/team_articles?blog_id=eq.'+team.id+'&slug=neq.'+articleSlug+'&published=eq.true&limit=3&order=published_at.desc&select=slug,title,cover_image_url,read_time_min',{headers:HH});
  const rel=await relRes.json()||[];
  const sec=document.getElementById('related-section');
  if(rel.length>0){
    sec.innerHTML='<h3>More from '+team.name+'</h3><div class="related-grid">'+rel.map(r=>{
      const img=r.cover_image_url?'<img src="'+r.cover_image_url+'" alt="" loading="lazy">':'<div style="font-size:20px;opacity:0.2">📄</div>';
      return '<a href="'+basePath+'/'+r.slug+'" class="related-card"><div class="related-card-img">'+img+'</div><div class="related-card-body"><h4>'+r.title+'</h4><span>'+(r.read_time_min||'5')+' min read</span></div></a>';
    }).join('')+'</div>';
  }else{sec.style.display='none';}
}

async function handleSub(e){
  e.preventDefault();const email=document.getElementById('sb-email').value.trim();if(!email)return false;
  const btn=document.getElementById('sb-btn'),msg=document.getElementById('sb-msg');
  btn.textContent='...';btn.disabled=true;
  try{await fetch(SB+'/rest/v1/intel_subscribers',{method:'POST',headers:{...HH,'Content-Type':'application/json','Prefer':'return=minimal'},body:JSON.stringify({email,source:'team_'+teamSlug})});}catch(e){}
  msg.style.display='block';msg.style.color='var(--tc)';msg.textContent='✓ Subscribed!';
  document.getElementById('sb-email').value='';btn.textContent='Subscribe';btn.disabled=false;return false;
}

load();
</script>
<script src="/empire-track.js" data-spoke="rkrt-team" defer></script>
</body>
</html>
