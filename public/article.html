<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RKRT Intel</title>
<meta name="description" content="Real estate recruiting intelligence powered by data.">
<meta property="og:title" content="RKRT Intel">
<meta property="og:site_name" content="RKRT Intel">
<meta name="twitter:card" content="summary_large_image">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#0B1120;--bg2:#0F1629;--bg3:#141C32;
  --green:#10B981;--green-dim:rgba(16,185,129,0.08);
  --t:#E8ECF4;--s:#8B9AB8;--m:#4B5975;--b:rgba(255,255,255,0.06);
  --card:#111827;
}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:var(--bg);color:var(--t);line-height:1.6;overflow-x:hidden}
a{color:inherit;text-decoration:none}
.wrap{max-width:740px;margin:0 auto;padding:0 24px}

/* NAV */
nav{position:sticky;top:0;z-index:100;background:rgba(11,17,32,0.92);backdrop-filter:blur(16px);border-bottom:1px solid var(--b)}
.nav-inner{max-width:1100px;margin:0 auto;padding:0 24px;height:52px;display:flex;align-items:center;justify-content:space-between}
.nav-logo{font-size:17px;font-weight:800}
.nav-logo .g{color:var(--green)}
.nav-back{font-size:13px;color:var(--s);display:flex;align-items:center;gap:6px}
.nav-back:hover{color:var(--t)}

/* ARTICLE */
.article-header{padding:40px 0 32px}
.article-meta{display:flex;gap:12px;align-items:center;flex-wrap:wrap;margin-bottom:16px}
.badge{display:inline-block;font-size:10px;font-weight:700;letter-spacing:1px;padding:3px 10px;border-radius:20px}
.badge-industry_news{background:rgba(59,130,246,0.12);color:#3B82F6}
.badge-brokerage_intel{background:rgba(249,115,22,0.12);color:#F97316}
.badge-market_data{background:rgba(16,185,129,0.12);color:#10B981}
.badge-playbook{background:rgba(139,92,246,0.12);color:#8B5CF6}
.badge-spotlight{background:rgba(236,72,153,0.12);color:#EC4899}
.badge-commission{background:rgba(245,158,11,0.12);color:#F59E0B}
.meta-text{font-size:12px;color:var(--m)}
.article-title{font-size:clamp(26px,4vw,38px);font-weight:800;line-height:1.15;margin-bottom:12px}
.article-subtitle{font-size:17px;color:var(--s);line-height:1.7;margin-bottom:24px}

/* AUTHOR BAR */
.author-bar{display:flex;align-items:center;gap:12px;padding:16px 0;border-top:1px solid var(--b);border-bottom:1px solid var(--b);margin-bottom:32px}
.author-avatar{width:36px;height:36px;border-radius:50%;background:linear-gradient(135deg,var(--green),#3B82F6);display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:800;color:#000;flex-shrink:0}
.author-info{flex:1}
.author-name{font-size:14px;font-weight:700}
.author-sub{font-size:11px;color:var(--m)}
.share-btns{display:flex;gap:6px}
.share-btn{width:32px;height:32px;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:14px;background:var(--card);border:1px solid var(--b);cursor:pointer;color:var(--s);transition:all 0.15s}
.share-btn:hover{color:var(--t);border-color:rgba(255,255,255,0.12)}

/* HERO IMAGE */
.article-hero{width:100%;border-radius:14px;margin-bottom:32px;overflow:hidden;max-height:420px;background:var(--card);display:flex;align-items:center;justify-content:center}
.article-hero img{width:100%;height:100%;object-fit:cover}

/* BODY */
.article-body{font-size:16px;line-height:1.85;color:var(--t)}
.article-body h2{font-size:22px;font-weight:700;margin:32px 0 12px;color:var(--t)}
.article-body h3{font-size:18px;font-weight:700;margin:24px 0 10px;color:var(--t)}
.article-body p{margin-bottom:18px}
.article-body ul,.article-body ol{margin:0 0 18px 24px}
.article-body li{margin-bottom:8px}
.article-body strong{color:var(--t)}
.article-body a{color:var(--green);text-decoration:underline}
.article-body blockquote{border-left:3px solid var(--green);padding:12px 18px;margin:18px 0;background:var(--green-dim);border-radius:0 8px 8px 0;font-style:italic;color:var(--s)}
.article-body img{max-width:100%;border-radius:10px;margin:18px 0}
.article-body table{width:100%;border-collapse:collapse;margin:18px 0;font-size:14px}
.article-body th,.article-body td{padding:10px 14px;border:1px solid var(--b);text-align:left}
.article-body th{background:var(--card);font-weight:700;font-size:12px;letter-spacing:0.5px;color:var(--s)}

/* INLINE CTA */
.inline-cta{border-radius:12px;padding:24px;margin:28px 0;text-align:center}
.inline-cta.green{background:linear-gradient(135deg,#065F46,#10B981)}
.inline-cta.dark{background:var(--card);border:1px solid var(--b)}
.inline-cta h3{font-size:18px;font-weight:700;margin-bottom:8px}
.inline-cta p{font-size:14px;color:rgba(255,255,255,0.8);margin-bottom:14px}
.inline-cta a{display:inline-block;padding:10px 24px;border-radius:8px;font-weight:700;font-size:14px}
.inline-cta a.white{background:#fff;color:#000}
.inline-cta a.green-btn{background:var(--green);color:#000}

/* INLINE AD */
.inline-ad{border:1px solid var(--b);border-radius:12px;padding:20px;margin:28px 0;display:flex;gap:14px;align-items:flex-start;background:var(--bg2)}
.inline-ad-label{font-size:9px;color:var(--m);font-weight:700;letter-spacing:1.5px;margin-bottom:8px}
.inline-ad-icon{font-size:28px;flex-shrink:0}
.inline-ad-body{flex:1}
.inline-ad h4{font-size:15px;font-weight:700;margin-bottom:4px}
.inline-ad p{font-size:13px;color:var(--s);margin-bottom:10px;line-height:1.5}
.inline-ad a{font-size:12px;font-weight:700;color:var(--green)}

/* TAGS */
.article-tags{display:flex;gap:8px;flex-wrap:wrap;margin:32px 0;padding-top:24px;border-top:1px solid var(--b)}
.tag{padding:5px 14px;border-radius:20px;font-size:12px;font-weight:600;background:var(--card);border:1px solid var(--b);color:var(--s)}

/* RELATED */
.related{margin:40px 0}
.related h3{font-size:18px;font-weight:700;margin-bottom:16px}
.related-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:16px}
.related-card{background:var(--card);border:1px solid var(--b);border-radius:10px;overflow:hidden;cursor:pointer;transition:border-color 0.2s}
.related-card:hover{border-color:rgba(255,255,255,0.12)}
.related-card-img{height:120px;background:var(--bg3);display:flex;align-items:center;justify-content:center;overflow:hidden}
.related-card-img img{width:100%;height:100%;object-fit:cover}
.related-card-body{padding:14px}
.related-card h4{font-size:14px;font-weight:700;line-height:1.35;margin-bottom:4px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.related-card span{font-size:11px;color:var(--m)}

/* EMAIL */
.email-capture{background:var(--card);border:1px solid var(--b);border-radius:14px;padding:28px;text-align:center;margin:40px 0}
.email-capture h3{font-size:18px;font-weight:800;margin-bottom:6px}
.email-capture p{font-size:14px;color:var(--s);margin-bottom:16px}
.email-form{display:flex;gap:10px;max-width:400px;margin:0 auto}
.email-form input{flex:1;padding:10px 14px;border-radius:8px;background:var(--bg);border:1px solid var(--b);color:var(--t);font-size:14px;outline:none;font-family:inherit;min-width:0}
.email-form input:focus{border-color:var(--green)}
.email-form button{padding:10px 20px;border-radius:8px;background:var(--green);color:#000;font-weight:700;font-size:14px;border:none;cursor:pointer;white-space:nowrap;font-family:inherit}

/* BOTTOM BANNER */
.bottom-banner{background:linear-gradient(135deg,#0B1120,#1E293B);border:1px solid var(--b);border-radius:14px;padding:32px;text-align:center;margin:40px 0}
.bottom-banner h2{font-size:22px;font-weight:800;margin-bottom:16px}
.bottom-banner a{display:inline-block;padding:12px 28px;border-radius:9px;background:var(--green);color:#000;font-weight:700;font-size:15px}

/* FOOTER */
footer{padding:28px 0;border-top:1px solid var(--b);margin-top:40px;background:var(--bg2)}
.footer-inner{max-width:1100px;margin:0 auto;padding:0 24px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px}
.footer-logo{font-size:15px;font-weight:800}
.footer-logo .g{color:var(--green)}
.footer-links{display:flex;gap:20px}
.footer-links a{font-size:12px;color:var(--m)}
.footer-copy{font-size:11px;color:var(--m)}

/* LOADING */
.loading-state{text-align:center;padding:80px 0;color:var(--m)}

@media(max-width:768px){
  .wrap{padding:0 16px}
  .article-title{font-size:24px}
  .article-subtitle{font-size:15px}
  .related-grid{grid-template-columns:1fr}
  .inline-ad{flex-direction:column}
  .email-form{flex-direction:column}
  .share-btns{gap:4px}
  .footer-inner{flex-direction:column;text-align:center}
  .author-bar{flex-wrap:wrap}
}
</style>
</head>
<body>

<nav>
  <div class="nav-inner">
    <a href="/" class="nav-logo">rkrt<span class="g">.intel</span></a>
    <a href="/" class="nav-back">← All Articles</a>
  </div>
</nav>

<div class="wrap">
  <div id="article-content" class="loading-state">Loading article...</div>
</div>

<footer>
  <div class="footer-inner">
    <div class="footer-logo">rkrt<span class="g">.intel</span></div>
    <div class="footer-links">
      <a href="/">Home</a>
      <a href="mailto:hello@rkrt.in">Contact</a>
      <a href="#">Privacy</a>
    </div>
    <div class="footer-copy">Powered by LIVIN Media · © 2026</div>
  </div>
</footer>

<script>
const SUPABASE_URL='https://usknntguurefeyzusbdh.supabase.co';
const SUPABASE_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InVza25udGd1dXJlZmV5enVzYmRoIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI0MTcwODAsImV4cCI6MjA4Nzk5MzA4MH0.pxexo90zyugIA4pPzLonGo3E1frr8bSZvz-XT7BmuqQ';
const H={apikey:SUPABASE_KEY,Authorization:'Bearer '+SUPABASE_KEY};

const CAT_LABELS={industry_news:'Industry News',brokerage_intel:'Brokerage Intel',market_data:'Market Data',playbook:'Playbook',spotlight:'Spotlight',commission:'Commission'};

function fmtDate(d){return new Date(d).toLocaleDateString('en-US',{month:'long',day:'numeric',year:'numeric'});}

function shareX(title,url){window.open('https://x.com/intent/tweet?text='+encodeURIComponent(title)+'&url='+encodeURIComponent(url),'_blank','width=550,height=420');}
function shareLI(url){window.open('https://www.linkedin.com/sharing/share-offsite/?url='+encodeURIComponent(url),'_blank','width=600,height=500');}
function shareEmail(title,url){window.location.href='mailto:?subject='+encodeURIComponent(title)+'&body='+encodeURIComponent(url);}
function copyLink(url){navigator.clipboard.writeText(url);const b=document.getElementById('copy-btn');if(b){b.textContent='✓';setTimeout(()=>b.textContent='🔗',1500);}}

async function loadArticle(){
  const params=new URLSearchParams(window.location.search);
  const slug=params.get('slug');
  if(!slug){document.getElementById('article-content').textContent='No article specified.';return;}

  try{
    const r=await fetch(SUPABASE_URL+'/rest/v1/intel_articles?slug=eq.'+encodeURIComponent(slug)+'&published=eq.true',{headers:H});
    const d=await r.json();
    if(!d||!d[0]){document.getElementById('article-content').innerHTML='<div class="loading-state">Article not found. <a href="/" style="color:var(--green)">Back to home →</a></div>';return;}
    const a=d[0];

    // Set page title and OG
    document.title=a.title+' — RKRT Intel';
    const ogTitle=document.querySelector('meta[property="og:title"]');if(ogTitle)ogTitle.content=a.title;
    const desc=document.querySelector('meta[name="description"]');if(desc)desc.content=a.subtitle||'';
    if(a.image_url){
      const ogImg=document.querySelector('meta[property="og:image"]');
      if(ogImg)ogImg.content=a.image_url;else{const m=document.createElement('meta');m.setAttribute('property','og:image');m.content=a.image_url;document.head.appendChild(m);}
    }

    const pageUrl=window.location.href;
    const catLabel=(CAT_LABELS[a.category]||a.category||'').toUpperCase();
    const authorInitial=(a.author||'R')[0].toUpperCase();

    // Build body with inline CTAs and ads
    let body=a.body||'<p>No content available.</p>';
    const paragraphs=body.split('</p>');
    let rebuilt='';
    for(let i=0;i<paragraphs.length;i++){
      rebuilt+=paragraphs[i]+(i<paragraphs.length-1?'</p>':'');
      // After 2nd paragraph: sponsored product ad
      if(i===1){
        rebuilt+=`<div class="inline-ad"><div class="inline-ad-icon">🔍</div><div class="inline-ad-body"><div class="inline-ad-label">SPONSORED</div><h4>Search 1.7M+ Real Estate Agents</h4><p>Find top producers by market, brokerage, and production. AI-powered enrichment pulls contact info instantly.</p><a href="https://join.rkrt.in">Try RKRT Free →</a></div></div>`;
      }
      // After 5th paragraph: agent CTA
      if(i===4){
        rebuilt+=`<div class="inline-cta dark"><h3>Thinking about your next move?</h3><p>Tell us what you're looking for. We'll match you with brokerage options — confidentially.</p><a href="https://join.rkrt.in" class="green-btn">Explore Options →</a></div>`;
      }
      // After 8th paragraph: commission calculator ad
      if(i===7){
        rebuilt+=`<div class="inline-ad"><div class="inline-ad-icon">🧮</div><div class="inline-ad-body"><div class="inline-ad-label">SPONSORED</div><h4>Commission Calculator</h4><p>See exactly how much more you could earn. Compare your current split to top brokerages side-by-side.</p><a href="https://join.rkrt.in">Calculate Now →</a></div></div>`;
      }
    }

    const html=`
      <div class="article-header">
        <div class="article-meta">
          <span class="badge badge-${a.category}">${catLabel}</span>
          <span class="meta-text">${a.published_at?fmtDate(a.published_at):''}</span>
          <span class="meta-text">${a.read_time||'5'} min read</span>
          <span class="meta-text">${a.views||0} views</span>
        </div>
        <h1 class="article-title">${a.title}</h1>
        ${a.subtitle?'<div class="article-subtitle">'+a.subtitle+'</div>':''}
        <div class="author-bar">
          <div class="author-avatar">${authorInitial}</div>
          <div class="author-info">
            <div class="author-name">${a.author||'RKRT Intel'}</div>
            <div class="author-sub">RKRT Intel Research</div>
          </div>
          <div class="share-btns">
            <div class="share-btn" title="Share on X" onclick="shareX('${(a.title||'').replace(/'/g,"\\'")}','${pageUrl}')">𝕏</div>
            <div class="share-btn" title="Share on LinkedIn" onclick="shareLI('${pageUrl}')">in</div>
            <div class="share-btn" title="Email" onclick="shareEmail('${(a.title||'').replace(/'/g,"\\'")}','${pageUrl}')">✉</div>
            <div class="share-btn" title="Copy link" id="copy-btn" onclick="copyLink('${pageUrl}')">🔗</div>
          </div>
        </div>
      </div>

      ${a.image_url?'<div class="article-hero"><img src="'+a.image_url+'" alt=""></div>':''}

      <div class="article-body">${rebuilt}</div>

      <!-- Mid CTA -->
      <div class="inline-cta green">
        <h3>Want to recruit from this data?</h3>
        <p>RKRT gives you the tools to find, reach, and close agents — powered by AI.</p>
        <a href="https://join.rkrt.in" class="white">Start 7-Day Free Trial →</a>
      </div>

      ${a.tags&&a.tags.length?'<div class="article-tags">'+a.tags.map(t=>'<span class="tag">'+t+'</span>').join('')+'</div>':''}

      <!-- Email capture -->
      <div class="email-capture">
        <h3>Get this kind of analysis every week</h3>
        <p>Recruiting intel, market data, and brokerage movements — every Tuesday.</p>
        <form class="email-form" onsubmit="return handleSub(event)">
          <input type="email" id="sub-email" placeholder="you@email.com" required>
          <button type="submit" id="sub-btn">Subscribe</button>
        </form>
        <div id="sub-msg" style="font-size:13px;margin-top:10px;display:none"></div>
      </div>

      <!-- Sponsored brokerage ad -->
      <div class="inline-ad">
        <div class="inline-ad-icon">🏢</div>
        <div class="inline-ad-body">
          <div class="inline-ad-label">SPONSORED</div>
          <h4>Advertise Your Brokerage on RKRT Intel</h4>
          <p>Reach 50,000+ real estate recruiters and decision-makers with targeted placements.</p>
          <a href="mailto:hello@rkrt.in">Learn More →</a>
        </div>
      </div>

      <!-- Related -->
      <div class="related" id="related-section"></div>

      <!-- Bottom Banner -->
      <div class="bottom-banner">
        <h2>Built on data from <span style="color:var(--green)">1.7M+ agents</span></h2>
        <a href="https://join.rkrt.in">Try RKRT Free →</a>
      </div>

      <!-- End CTA -->
      <div class="inline-cta green" style="margin-bottom:0">
        <h3>Get ahead of the movement</h3>
        <p>The best recruiters don't wait for agents to switch — they see it coming. RKRT gives you the edge.</p>
        <a href="https://join.rkrt.in" class="white">Start 7-Day Free Trial →</a>
      </div>
    `;

    document.getElementById('article-content').innerHTML=html;
    document.getElementById('article-content').classList.remove('loading-state');

    // Increment views
    try{
      await fetch(SUPABASE_URL+'/rest/v1/intel_articles?slug=eq.'+encodeURIComponent(slug),{
        method:'PATCH',headers:{...H,'Content-Type':'application/json','Prefer':'return=minimal'},
        body:JSON.stringify({views:(a.views||0)+1})
      });
    }catch(e){}

    // Load related
    loadRelated(a.category,a.slug);
  }catch(e){
    document.getElementById('article-content').innerHTML='<div class="loading-state">Error loading article. <a href="/" style="color:var(--green)">Back to home →</a></div>';
  }
}

async function loadRelated(category,currentSlug){
  try{
    const r=await fetch(SUPABASE_URL+'/rest/v1/intel_articles?category=eq.'+encodeURIComponent(category)+'&slug=neq.'+encodeURIComponent(currentSlug)+'&published=eq.true&limit=3&order=published_at.desc',{headers:H});
    const d=await r.json()||[];
    const section=document.getElementById('related-section');
    if(d.length===0){section.style.display='none';return;}
    section.innerHTML='<h3>Related Articles</h3><div class="related-grid">'+d.map(a=>{
      const img=a.image_url?'<img src="'+a.image_url+'" alt="" loading="lazy">':'<div style="font-size:24px;opacity:0.3">📄</div>';
      return '<a href="/article?slug='+a.slug+'" class="related-card"><div class="related-card-img">'+img+'</div><div class="related-card-body"><h4>'+a.title+'</h4><span>'+(a.read_time||'3')+' min read</span></div></a>';
    }).join('')+'</div>';
  }catch(e){}
}

async function handleSub(e){
  e.preventDefault();
  const email=document.getElementById('sub-email').value.trim();
  if(!email)return false;
  const btn=document.getElementById('sub-btn');const msg=document.getElementById('sub-msg');
  btn.textContent='...';btn.disabled=true;
  try{
    await fetch(SUPABASE_URL+'/rest/v1/intel_subscribers',{
      method:'POST',headers:{...H,'Content-Type':'application/json','Prefer':'return=minimal'},
      body:JSON.stringify({email,source:'intel_article'})
    });
    msg.style.display='block';msg.style.color='var(--green)';msg.textContent='✓ Subscribed!';
    document.getElementById('sub-email').value='';
  }catch(err){
    msg.style.display='block';msg.style.color='#F43F5E';msg.textContent='Error. Try again.';
  }
  btn.textContent='Subscribe';btn.disabled=false;
  return false;
}

loadArticle();
</script>
<script src="/empire-track.js" data-spoke="rkrt-intel" defer></script>
</body>
</html>
